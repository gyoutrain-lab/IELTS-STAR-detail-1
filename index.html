<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IELTS Band 9 Mastery Engine</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; line-height: 1.6; }
        .app-container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .overview { background: #e8f6f3; padding: 15px; border-left: 6px solid #16a085; margin-bottom: 20px; border-radius: 4px; }
        .stage { margin-bottom: 20px; padding: 15px; border-radius: 8px; border-left: 6px solid #2980b9; background: #fdfdfd; border: 1px solid #eee; }
        .summary-box { background: #2c3e50; color: white; padding: 20px; border-radius: 8px; margin-top: 20px; }
        .basic { color: #c0392b; font-weight: bold; }
        .advanced { color: #27ae60; font-weight: bold; }
        .explanation { font-size: 0.85em; color: #444; background: #f0f4f8; padding: 10px; border-radius: 4px; margin-top: 5px; border-left: 4px solid #3498db; }
        .voice-btn { cursor: pointer; background: #3498db; color: white; border: none; padding: 6px 12px; border-radius: 4px; margin-top: 5px; }
        .nav-btn { padding: 15px 30px; cursor: pointer; background: #27ae60; color: white; border: none; border-radius: 5px; font-weight: bold; font-size: 1.1em; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>

<div class="app-container">
    <h2 id="topic-header">Loading...</h2>
    <div id="overview-area" class="overview"></div>
    <div id="content-area"></div>
    <div id="summary-area" class="summary-box"></div>
    <button class="nav-btn" onclick="nextTopic()">Next IELTS Topic ➔</button>
</div>

<script>
const data = [
    { t: "1. Hometown", o: "Discussing one's origins requires balancing descriptive language with an analytical look at urban development.", s: ["I lived there and saw it growing.", "The longitudinal urbanization of my hometown reflects deep demographic shifts and spatial transformation.", "Nominalization creates a professional, detached observation."], ch: ["It is hard to keep the history.", "Notwithstanding heritage preservation efforts, the city continues to expand rapidly.", "Complex conjunctions manage logical conflict."], a: ["I was living there and saw changes.", "While I was residing there, never had I witnessed such accelerated developmental momentum.", "Inversion adds professional dramatic weight."], r: ["It is better for the future.", "It would be more accurate to conclude that this fosters long-term community resilience.", "Hedging turns a simple feeling into a reasoned conclusion."], summary: "The longitudinal urbanization of my hometown reflects deep demographic shifts and spatial transformation. Notwithstanding heritage preservation efforts, the city continues to expand rapidly. While I was residing there, never had I witnessed such accelerated developmental momentum; therefore, it would be more accurate to conclude that this fosters long-term community resilience." },
    { t: "2. Work & Career", o: "Articulating professional objectives demonstrates clarity, ambition, and a command of industry-related terminology.", s: ["I like my job and I learn.", "The professional trajectory of my career emphasizes clinical excellence through longitudinal skill acquisition.", "Abstract nouns shift the focus from personal to professional."], ch: ["It is hard work.", "Given the multifaceted complexity of workplace dynamics, adaptability is paramount.", "Using 'Given' links your argument to context."], a: ["I was working and I saw things.", "While I was navigating my professional objectives, never had I attained such clinical depth.", "Inversion emphasizes unique achievement."], r: ["It is good for my future.", "It would be more plausible to conclude that this focus fosters sustained career longevity.", "Hedging avoids bluntness and adds authority."], summary: "The professional trajectory of my career emphasizes clinical excellence through longitudinal skill acquisition. Given the multifaceted complexity of workplace dynamics, adaptability is paramount. While I was navigating my professional objectives, never had I attained such clinical depth; consequently, it would be more plausible to conclude that this focus fosters sustained career longevity." },
    { t: "3. Education", o: "Reflecting on learning processes demonstrates intellectual curiosity and a systematic approach to personal development.", s: ["I study hard at school.", "The academic pursuit of my discipline prioritizes rigorous evidence-based practice and intellectual discovery.", "Frames studies as a formal research discipline."], ch: ["It is hard to learn everything.", "Considering the complexity of pedagogical frameworks, lifelong learning is essential.", "Demonstrates ability to balance factors."], a: ["I was studying and reading.", "While I was engaging in inquiry, never had I encountered more challenging intellectual paradigms.", "Inversion marks a high-level academic milestone."], r: ["It makes me smarter.", "It would be more significant to conclude that this approach fosters professional mastery.", "Hedging adds academic maturity."], summary: "The academic pursuit of my discipline prioritizes rigorous evidence-based practice and intellectual discovery. Considering the complexity of pedagogical frameworks, lifelong learning is essential. While I was engaging in inquiry, never had I encountered more challenging intellectual paradigms; therefore, it would be more significant to conclude that this approach fosters professional mastery." },
    { t: "4. Technology", o: "Digital literacy is an indispensable requirement in contemporary society, and discussing it highlights analytical capacity.", s: ["I use my phone every day.", "The rapid integration of advanced digital technologies fundamentally revolutionizes contemporary workflow efficiency.", "Moving to nominalization creates systemic observation."], ch: ["It is hard to learn new tools.", "Insofar as the complexity of global connectivity is concerned, digital literacy is an indispensable requirement.", "Provides a high-level logical framework."], a: ["I was using my computer.", "While I was utilizing these tools, never had I optimized my tasks with such surgical precision.", "Inversion signals operational mastery."], r: ["It makes work faster.", "It would be more analytical to conclude that this transition fosters systemic innovation.", "Hedging maintains a calm, analytical tone."], summary: "The rapid integration of advanced digital technologies fundamentally revolutionizes contemporary workflow efficiency. Insofar as the complexity of global connectivity is concerned, digital literacy is an indispensable requirement. While I was utilizing these tools, never had I optimized my tasks with such surgical precision; it would be more analytical to conclude that this transition fosters systemic innovation." },
    { t: "5. Health & Fitness", o: "Preventative wellness is a central theme in modern healthcare discourse, reflecting self-discipline and responsibility.", s: ["I exercise to stay healthy.", "The prioritization of personal wellness mandates a lifestyle characterized by preventative care.", "Frames health as a clinical recommendation."], ch: ["It is hard to be consistent.", "Notwithstanding the complexity of maintaining physical conditioning, consistency remains key.", "Contrasts process difficulty with necessity."], a: ["I was training at the gym.", "While I was training consistently, never had I prioritized my holistic well-being with such commitment.", "Inversion highlights disciplined commitment."], r: ["It makes me stronger.", "It would be more prudent to conclude that this lifestyle fosters sustained performance.", "Hedging makes advice sound like an expert judgment."], summary: "The prioritization of personal wellness mandates a lifestyle characterized by preventative care. Notwithstanding the complexity of maintaining physical conditioning, consistency remains key. While I was training consistently, never had I prioritized my holistic well-being with such commitment; therefore, it would be more prudent to conclude that this lifestyle fosters sustained performance." },
    { t: "6. Travel & Culture", o: "Travel is a medium for cultural exchange that broadens perspectives and highlights critical awareness.", s: ["I travel to see new places.", "Cultural immersion experiences serve to significantly broaden one's global perspectives and awareness.", "Nominalization focuses on the experience as a whole."], ch: ["It is hard to understand others.", "Given the complexity of cross-cultural communication, travel is an effective medium for learning.", "Links experience to global standards."], a: ["I was traveling around.", "While I was navigating diverse environments, never had I encountered such profound cultural diversity.", "Inversion creates a sense of formal engagement."], r: ["It is a good experience.", "It would be more insightful to conclude that this fosters global empathy.", "Hedging turns feelings into observations."], summary: "Cultural immersion experiences serve to significantly broaden one's global perspectives and awareness. Given the complexity of cross-cultural communication, travel is an effective medium for learning. While I was navigating diverse environments, never had I encountered such profound cultural diversity; it would be more insightful to conclude that this fosters global empathy." },
    { t: "7. Environment", o: "Environmental stewardship is a global priority, and discussing it effectively showcases sophisticated vocabulary and ethical reasoning.", s: ["We must save the earth.", "The strategic preservation of natural habitats is crucial for long-term resource optimization.", "Focuses on 'strategic preservation'."], ch: ["It is hard to stop pollution.", "Considering the complexity of climate action, collective responsibility is the only path forward.", "Frames the issue as a collective challenge."], a: ["I was helping the planet.", "While I was advocating for sustainable practices, never had I supported such impactful conservation efforts.", "Inversion adds weight to your advocacy."], r: ["It is good for the future.", "It would be more substantiated to conclude that this fosters long-term viability.", "Hedging adds credibility to your stance."], summary: "The strategic preservation of natural habitats is crucial for long-term resource optimization. Considering the complexity of climate action, collective responsibility is the only path forward. While I was advocating for sustainable practices, never had I supported such impactful conservation efforts; therefore, it would be more substantiated to conclude that this fosters long-term viability." },
    { t: "8. Hobbies", o: "Hobbies provide a window into personal development and demonstrate the ability to articulate individual growth processes.", s: ["I have fun with my hobbies.", "The cultivation of creative hobbies involves complex problem-solving and continuous skill enhancement.", "Elevates hobbies to a skill-building process."], ch: ["It is hard to be good at them.", "Reflecting on the complexity of skill development, the process is intrinsically rewarding.", "Provides a structured logical path."], a: ["I was practicing my hobby.", "While I was dedicating time to this pursuit, never had I refined my capabilities with such intent.", "Inversion signals goal-oriented practice."], r: ["It makes me happy.", "It would be more appropriate to conclude that this practice fosters personal growth.", "Hedging presents happiness as a measurable outcome."], summary: "The cultivation of creative hobbies involves complex problem-solving and continuous skill enhancement. Reflecting on the complexity of skill development, the process is intrinsically rewarding. While I was dedicating time to this pursuit, never had I refined my capabilities with such intent; it would be more appropriate to conclude that this practice fosters personal growth." },
    { t: "9. Future Goals", o: "Setting long-term objectives is an essential professional skill that requires logical planning and foresight.", s: ["I plan to succeed.", "The strategic formulation of long-term objectives is essential for achieving professional mobility.", "Formulating objectives sounds highly professional."], ch: ["It is hard to plan ahead.", "Notwithstanding the complexity of career transitions, I have developed a comprehensive roadmap.", "Contrasts market difficulty with planning."], a: ["I was thinking about my goals.", "While I was envisioning my future, never had I cultivated a more disciplined vision.", "Inversion highlights maturity."], r: ["It is a good plan.", "It would be more strategic to conclude that this fosters long-term stability.", "Hedging frames goals as strategic choices."], summary: "The strategic formulation of long-term objectives is essential for achieving professional mobility. Notwithstanding the complexity of career transitions, I have developed a comprehensive roadmap. While I was envisioning my future, never had I cultivated a more disciplined vision; therefore, it would be more strategic to conclude that this fosters long-term stability." },
    { t: "10. Media & News", o: "Critical engagement with information flows is a hallmark of an informed and analytical global citizen.", s: ["I read news every day.", "The critical interpretation of contemporary media highlights the importance of analyzing information flows.", "Interpretation is a more academic process."], ch: ["It is hard to find the truth.", "Given the complexity of source verification, extreme vigilance is required.", "Frames media as a verification challenge."], a: ["I was watching the news.", "While I was analyzing current events, never had I evaluated discourse with such analytical precision.", "Inversion emphasizes analytical skill."], r: ["It helps me know more.", "It would be more objective to conclude that this fosters greater clarity.", "Hedging makes consumption a critical task."], summary: "The critical interpretation of contemporary media highlights the importance of analyzing information flows. Given the complexity of source verification, extreme vigilance is required. While I was analyzing current events, never had I evaluated discourse with such analytical precision; it would be more objective to conclude that this fosters greater clarity." }
];

let idx = 0;
function speak(text) { window.speechSynthesis.speak(new SpeechSynthesisUtterance(text)); }

function render() {
    document.getElementById('topic-header').innerText = data[idx].t;
    document.getElementById('overview-area').innerHTML = `<strong>Competency Overview:</strong> ${data[idx].o}`;
    let html = "";
    const sections = ["1. Scene (Nominalization)", "2. Challenge (Complex Conjunction)", "3. Action (Inversion)", "4. Impact (Academic Hedging)"];
    const keys = ['s', 'ch', 'a', 'r'];
    
    keys.forEach((k, i) => {
        let stageText = `${sections[i]}: ${data[idx][k][1]}`;
        html += `<div class="stage"><h3>${sections[i]}</h3>
                 <p>Basic: <span class="basic">${data[idx][k][0]}</span></p>
                 <p>Band 9: <span class="advanced">${data[idx][k][1]}</span></p>
                 <div class="explanation"><strong>Why:</strong> ${data[idx][k][2]}</div>
                 <button class="voice-btn" onclick="speak('${stageText.replace(/'/g, "")}')">🔊 Listen to Stage</button></div>`;
    });
    
    document.getElementById('content-area').innerHTML = html;
    document.getElementById('summary-area').innerHTML = `<h3>Master Summary</h3><p>${data[idx].summary}</p>
        <button class="voice-btn" style="background:#27ae60" onclick="speak('${data[idx].summary.replace(/'/g, "")}')">🔊 Listen to Full Summary</button>`;
}

function nextTopic() { idx = (idx + 1) % data.length; render(); }
render();
</script>
</body>
</html>
