<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Band 9 IELTS Engine</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .app-container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .input-group { margin: 15px 0; padding: 15px; background: #f8f9fa; border-left: 5px solid #2c3e50; }
        .placeholder-text { font-size: 0.9em; color: #2c3e50; font-weight: bold; background: #dfe6e9; padding: 5px; display: block; margin-bottom: 5px; }
        textarea { width: 95%; height: 50px; border: 1px solid #ccc; padding: 10px; margin-bottom: 5px; }
        button { padding: 10px 15px; cursor: pointer; background: #2c3e50; color: white; border: none; margin-top: 5px; }
        .mic-btn { background: #e74c3c; }
        #review { margin-top: 20px; padding: 15px; border: 1px solid #ddd; display: none; background: #fff; }
    </style>
</head>
<body>

<div class="app-container">
    <h2 id="level-title">Level 1: Hometown</h2>
    
    <div class="input-group">
        <label>Scene (Nominalization):</label>
        <span class="placeholder-text" id="p-sit"></span>
        <textarea id="sit"></textarea>
        <button class="mic-btn" onclick="startDictation('sit')">🎤 Voice</button>
    </div>
    <div class="input-group">
        <label>Challenge (Complex Conjunction):</label>
        <span class="placeholder-text" id="p-task"></span>
        <textarea id="task"></textarea>
        <button class="mic-btn" onclick="startDictation('task')">🎤 Voice</button>
    </div>
    <div class="input-group">
        <label>Action (Past Progressive + Inversion):</label>
        <span class="placeholder-text" id="p-act"></span>
        <textarea id="act"></textarea>
        <button class="mic-btn" onclick="startDictation('act')">🎤 Voice</button>
    </div>
    <div class="input-group">
        <label>Impact (Academic Hedging):</label>
        <span class="placeholder-text" id="p-res"></span>
        <textarea id="res"></textarea>
        <button class="mic-btn" onclick="startDictation('res')">🎤 Voice</button>
    </div>

    <button onclick="evaluateDrill()">Submit & Audit</button>
    <button onclick="nextLevel()">Next Competency</button>

    <div id="review"></div>
</div>

<script>
    const levels = [
        { t: "Hometown", s: "The rapid urbanization of my hometown reflects significant demographic shifts and...", t: "Notwithstanding the traditional heritage preservation efforts...", a: "While I was residing in that region, never had I witnessed such...", r: "It would be more accurate to conclude that this fosters community resilience and...", full: "The rapid urbanization of my hometown reflects significant demographic shifts and infrastructural growth. Notwithstanding the traditional heritage preservation efforts, the city is evolving. While I was residing in that region, never had I witnessed such dynamic expansion. It would be more accurate to conclude that this fosters community resilience and regional prosperity." },
        { t: "Work/Career", s: "The professional trajectory of my career emphasizes clinical excellence and...", t: "Given the inherent complexity of modern workplace dynamics and performance standards...", a: "While I was pursuing my career goals, never had I attained such...", r: "It would be more plausible to conclude that this fosters long-term professional development and...", full: "The professional trajectory of my career emphasizes clinical excellence and continuous skill acquisition. Given the inherent complexity of modern workplace dynamics and performance standards, adaptability is key. While I was pursuing my career goals, never had I attained such depth of experience. It would be more plausible to conclude that this fosters long-term professional development and institutional impact." },
        { t: "Studies/Education", s: "The pursuit of academic qualifications prioritizes evidence-based practice and...", t: "Considering the technical complexity of pedagogical research and curriculum design...", a: "While I was engaging in advanced studies, never had I experienced such...", r: "It would be more significant to conclude that this fosters intellectual rigor and...", full: "The pursuit of academic qualifications prioritizes evidence-based practice and critical analysis. Considering the technical complexity of pedagogical research and curriculum design, learning is an iterative process. While I was engaging in advanced studies, never had I experienced such academic stimulation. It would be more significant to conclude that this fosters intellectual rigor and career mastery." }
        // (Levels 4-10 can be added following this structure)
    ];

    let current = 0;
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    let activeField = '';

    function startDictation(id) { activeField = id; recognition.start(); }
    recognition.onresult = (e) => { document.getElementById(activeField).value = e.results[0][0].transcript; };

    function evaluateDrill() {
        document.getElementById('review').innerHTML = `<h3>Competency Audit</h3><p><strong>Band 9 Model:</strong><br>${levels[current].full}</p><button onclick="speakModel()">🔊 Listen</button>`;
        document.getElementById('review').style.display = 'block';
    }

    function speakModel() { window.speechSynthesis.speak(new SpeechSynthesisUtterance(levels[current].full)); }

    function nextLevel() {
        current = (current + 1) % levels.length;
        document.getElementById('level-title').innerText = "Level " + (current + 1) + ": " + levels[current].t;
        document.getElementById('p-sit').innerText = levels[current].s;
        document.getElementById('p-task').innerText = levels[current].t;
        document.getElementById('p-act').innerText = levels[current].a;
        document.getElementById('p-res').innerText = levels[current].r;
        document.querySelectorAll('textarea').forEach(t => t.value = '');
        document.getElementById('review').style.display = 'none';
    }
    nextLevel();
</script>
</body>
</html>
