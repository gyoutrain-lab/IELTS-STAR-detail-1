<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Band 9 Drill: High-Density Cognitive Anchors</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .app-container { max-width: 850px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .input-group { margin: 20px 0; padding: 15px; background: #fdfdfd; border-left: 6px solid #2980b9; }
        .anchor-text { font-size: 0.95em; color: #2c3e50; font-weight: 600; background: #dcdde1; padding: 10px; display: block; margin-bottom: 8px; border-radius: 4px; }
        textarea { width: 100%; height: 70px; border: 1px solid #bdc3c7; padding: 12px; font-size: 1em; }
        button { padding: 12px 20px; cursor: pointer; background: #2980b9; color: white; border: none; margin-top: 10px; font-weight: bold; }
        .mic-btn { background: #c0392b; }
        #review { margin-top: 25px; padding: 20px; border: 1px solid #bdc3c7; display: none; background: #f1f2f6; }
    </style>
</head>
<body>

<div class="app-container">
    <h2 id="level-title">Level 1: Hometown</h2>
    <div id="drill-area">
        <div class="input-group">
            <label>Scene (Nominalization):</label>
            <span class="anchor-text" id="p-sit"></span>
            <textarea id="sit"></textarea>
            <button class="mic-btn" onclick="startDictation('sit')">🎤 Record Segment</button>
        </div>
        <div class="input-group">
            <label>Challenge (Complex Conjunction):</label>
            <span class="anchor-text" id="p-task"></span>
            <textarea id="task"></textarea>
            <button class="mic-btn" onclick="startDictation('task')">🎤 Record Segment</button>
        </div>
        <div class="input-group">
            <label>Action (Past Progressive + Inversion):</label>
            <span class="anchor-text" id="p-act"></span>
            <textarea id="act"></textarea>
            <button class="mic-btn" onclick="startDictation('act')">🎤 Record Segment</button>
        </div>
        <div class="input-group">
            <label>Impact (Academic Hedging):</label>
            <span class="anchor-text" id="p-res"></span>
            <textarea id="res"></textarea>
            <button class="mic-btn" onclick="startDictation('res')">🎤 Record Segment</button>
        </div>
    </div>
    <button onclick="evaluateDrill()">Submit & Generate Audit</button>
    <button onclick="nextLevel()">Next Competency</button>
    <div id="review"></div>
</div>

<script>
    const levels = [
        { t: "Hometown", s: "The longitudinal urbanization of my hometown reflects deep demographic shifts and systemic infrastructural expansion...", t: "Notwithstanding the traditional heritage preservation efforts and localized economic pressures...", a: "While I was experiencing the local transition, never had I witnessed such accelerated developmental momentum...", r: "It would be more accurate to conclude that this fosters long-term community resilience and sustainable prosperity...", full: "The longitudinal urbanization of my hometown reflects deep demographic shifts and systemic infrastructural expansion. Notwithstanding the traditional heritage preservation efforts and localized economic pressures, the urban environment is evolving rapidly. While I was experiencing the local transition, never had I witnessed such accelerated developmental momentum. It would be more accurate to conclude that this fosters long-term community resilience and sustainable prosperity." },
        { t: "Work/Career", s: "The professional trajectory of my career emphasizes clinical excellence through longitudinal skill acquisition and evidence-based practice...", t: "Given the multifaceted complexity of modern workplace dynamics and rigorous performance standards...", a: "While I was navigating my professional objectives, never had I attained such comprehensive clinical depth...", r: "It would be more plausible to conclude that this fosters sustained career longevity and significant institutional impact...", full: "The professional trajectory of my career emphasizes clinical excellence through longitudinal skill acquisition and evidence-based practice. Given the multifaceted complexity of modern workplace dynamics and rigorous performance standards, adaptability is essential. While I was navigating my professional objectives, never had I attained such comprehensive clinical depth. It would be more plausible to conclude that this fosters sustained career longevity and significant institutional impact." }
    ];

    let current = 0;
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    let activeField = '';

    function startDictation(id) { activeField = id; recognition.start(); }
    recognition.onresult = (e) => { document.getElementById(activeField).value = e.results[0][0].transcript; };

    function evaluateDrill() {
        document.getElementById('review').innerHTML = `<h3>Band 9 Audit Report</h3><p><strong>Full Elaborated Model:</strong><br>${levels[current].full}</p><button onclick="speakModel()">🔊 Hear Perfect Fluency</button>`;
        document.getElementById('review').style.display = 'block';
    }

    function speakModel() { window.speechSynthesis.speak(new SpeechSynthesisUtterance(levels[current].full)); }

    function nextLevel() {
        current = (current + 1) % levels.length;
        document.getElementById('level-title').innerText = "Level " + (current + 1) + ": " + levels[current].t;
        document.getElementById('p-sit').innerText = levels[current].s;
        document.getElementById('p-task').innerText = levels[current].t;
        document.getElementById('p-act').innerText = levels[current].a;
        document.getElementById('p-res').innerText = levels[current].r;
        document.querySelectorAll('textarea').forEach(t => t.value = '');
        document.getElementById('review').style.display = 'none';
    }
    nextLevel();
</script>
</body>
</html>
