<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Band 9 IELTS Drill: Semantic Mind Map</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .app-container { max-width: 850px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .input-group { margin: 15px 0; padding: 15px; background: #f8f9fa; border-left: 5px solid #2c3e50; }
        .placeholder-text { font-size: 0.85em; color: #555; font-style: italic; background: #e8ecef; padding: 8px; border-radius: 4px; display: block; margin-bottom: 5px; border: 1px dashed #95a5a6; }
        textarea { width: 100%; height: 60px; border: 1px solid #ccc; padding: 10px; }
        button { padding: 10px 15px; cursor: pointer; background: #2c3e50; color: white; border: none; margin-top: 5px; }
        .mic-btn { background: #e74c3c; }
        #review { margin-top: 20px; padding: 15px; border: 1px solid #ddd; display: none; background: #fff; }
    </style>
</head>
<body>

<div class="app-container">
    <h2 id="level-title">Level 1: Hometown</h2>
    <div id="drill-area">
        <div class="input-group">
            <label>Scene (Nominalization):</label>
            <span class="placeholder-text" id="p-sit"></span>
            <textarea id="sit"></textarea>
            <button class="mic-btn" onclick="startDictation('sit')">🎤 Voice</button>
        </div>
        <div class="input-group">
            <label>Challenge (Complex Conjunction):</label>
            <span class="placeholder-text" id="p-task"></span>
            <textarea id="task"></textarea>
            <button class="mic-btn" onclick="startDictation('task')">🎤 Voice</button>
        </div>
        <div class="input-group">
            <label>Action (Past Progressive + Inversion):</label>
            <span class="placeholder-text" id="p-act"></span>
            <textarea id="act"></textarea>
            <button class="mic-btn" onclick="startDictation('act')">🎤 Voice</button>
        </div>
        <div class="input-group">
            <label>Impact (Academic Hedging):</label>
            <span class="placeholder-text" id="p-res"></span>
            <textarea id="res"></textarea>
            <button class="mic-btn" onclick="startDictation('res')">🎤 Voice</button>
        </div>
    </div>
    <button onclick="evaluateDrill()">Submit & Audit</button>
    <button onclick="nextLevel()">Next Competency</button>
    <div id="review"></div>
</div>

<script>
    const levels = [
        { t: "Hometown", s: "The rapid [urbanization/infrastructure/demographic shifts] of my hometown reflects...", t: "Notwithstanding the [heritage preservation/modernization/cultural heritage]...", a: "While I was [living/observing/participating] there, never had I witnessed such [dynamic expansion/growth]...", r: "It would be more accurate to conclude that this fosters [community resilience/prosperity/stability]...", full: "The rapid urbanization of my hometown reflects significant demographic shifts and infrastructural growth. Notwithstanding the traditional heritage preservation efforts, the city is evolving. While I was residing in that region, never had I witnessed such dynamic expansion. It would be more accurate to conclude that this fosters community resilience and regional prosperity." },
        { t: "Work/Career", s: "The professional trajectory of my career emphasizes [clinical excellence/skill acquisition/evidence-based practice]...", t: "Given the inherent complexity of [workplace dynamics/performance standards/clinical environments]...", a: "While I was pursuing my career goals, never had I attained such [depth of experience/proficiency]...", r: "It would be more plausible to conclude that this fosters [long-term development/institutional impact/career mastery]...", full: "The professional trajectory of my career emphasizes clinical excellence and continuous skill acquisition. Given the inherent complexity of modern workplace dynamics and performance standards, adaptability is key. While I was pursuing my career goals, never had I attained such depth of experience. It would be more plausible to conclude that this fosters long-term professional development and institutional impact." }
    ];

    let current = 0;
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    let activeField = '';

    function startDictation(id) { activeField = id; recognition.start(); }
    recognition.onresult = (e) => { document.getElementById(activeField).value = e.results[0][0].transcript; };

    function evaluateDrill() {
        document.getElementById('review').innerHTML = `<h3>Competency Audit</h3><p><strong>Band 9 Model:</strong><br>${levels[current].full}</p><button onclick="speakModel()">🔊 Listen to Model</button>`;
        document.getElementById('review').style.display = 'block';
    }

    function speakModel() { window.speechSynthesis.speak(new SpeechSynthesisUtterance(levels[current].full)); }

    function nextLevel() {
        current = (current + 1) % levels.length;
        document.getElementById('level-title').innerText = "Level " + (current + 1) + ": " + levels[current].t;
        document.getElementById('p-sit').innerText = levels[current].s;
        document.getElementById('p-task').innerText = levels[current].t;
        document.getElementById('p-act').innerText = levels[current].a;
        document.getElementById('p-res').innerText = levels[current].r;
        document.querySelectorAll('textarea').forEach(t => t.value = '');
        document.getElementById('review').style.display = 'none';
    }
    nextLevel();
</script>
</body>
</html>
